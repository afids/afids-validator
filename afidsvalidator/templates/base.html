<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Validate and train anatomical fiducial placement across 32 brain landmarks — an open neuroimaging framework." />
    <meta name="author" content="AFIDs Project" />
    <meta name="theme-color" content="#080808" />

    <title>AFIDs Validator{% block title %}{% endblock %}</title>

    <!-- favicon -->
    <link rel="shortcut icon" href="{{ url_for('static', filename='images/afid.png') }}" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-+0n0xVW2eSR5OomGNYDnhzAbDsOXxcvSN1TPprVMTNDbiYZCxYbOOl7+AMvyTG2x"
      crossorigin="anonymous"
    />

    <!-- Google fonts: Bebas Neue + Space Mono + Inter -->
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- AFIDs custom styles -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='lib/afidsvalidator-react/styles/afids_custom.css') }}"
      type="text/css"
    />
  </head>

  <body>
    <div class="container-fluid" style="padding: 0;">
      <div class="container" style="max-width: 1100px;">
        <header>
          <div id="react-navbar"></div>
        </header>

        <main>{% block content %}{% endblock content %}</main>

        <div id="react-footer"></div>
      </div>
    </div>

    <script type="text/javascript" src="{{ url_for('static', filename='lib/afidsvalidator-react/dist/index.js') }}"></script>
    <script>renderNavbar({{ "true" if current_user.is_authenticated else "false" }})</script>
    <script>renderFooter()</script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-gtEjrD/SeCtmISkJkNUaaKMoLD0//ElJ19smozuHV6z3Iehds+3Ulb9Bn9Plx0x4"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
